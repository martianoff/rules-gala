matrix:
  platform:
    - debian11
    - ubuntu2004
    - macos
    - windows
  bazel:
    - 7.x
    - 8.x

tasks:
  verify_module:
    name: "Verify gala_team module loads"
    platform: ${{ platform }}
    bazel: ${{ bazel }}
    build_targets:
      # gala_gazelle is a dev_dependency, so the //:gazelle tooling targets are
      # unavailable when gala_team is consumed as a non-root module. Build the
      # application packages, which depend only on @rules_gala.
      - "@gala_team//app/..."
      - "@gala_team//cmd/..."
